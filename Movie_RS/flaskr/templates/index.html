<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Recommender System — Enhanced</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
<div id="app">
    <template v-if="isLoading">
        <section class="hero is-fullheight">
            <div class="hero-body"><p class="title">Loading...</p></div>
        </section>
    </template>
    <template v-else>
        <div class="container">
            <nav class="navbar" role="navigation">
                <div class="navbar-brand">
                    <a class="navbar-item" href="/">
                        <span class="is-size-3">🎬 Movies Recommender <span class="tag is-info is-light ml-2">Enhanced</span></span>
                    </a>
                </div>
                <div class="navbar-end">
                    <div class="navbar-item">
                        <div class="field mr-3">
                            <div class="control">
                                <label class="label is-small mb-0">
                                    <i class="fa fa-user mr-1"></i>Profile
                                </label>
                                <div class="select is-small">
                                    <select :value="profileId"
                                            @change="switchProfile($event.target.value)">
                                        <option value="">(default)</option>
                                        <option v-for="p in profileIds" :value="p">[[ p ]]</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="field has-addons mr-3">
                            <div class="control"><label class="label is-small mr-1">Diversity</label></div>
                            <div class="control">
                                <input type="range" min="0" max="100" step="5"
                                       :value="diversity" @input="onDiversityChange($event)">
                                <span class="tag is-light ml-1">[[ diversity ]]%</span>
                            </div>
                        </div>
                        <div class="buttons">
                            <button class="button is-light" @click="openTaste">
                                <span class="icon"><i class="fa fa-pie-chart"></i></span>
                                <span>Your Taste</span>
                            </button>
                            <button class="button is-light" @click="showDiary = true">
                                <span class="icon"><i class="fa fa-bookmark"></i></span>
                                <span>Feedback ([[ userLikes.length ]]/[[ userDislikes.length ]])</span>
                            </button>
                            <button class="button is-link" @click="showGenres = true">
                                <span class="icon"><i class="fa fa-tags"></i></span><span>Genres</span>
                            </button>
                            <button class="button is-danger is-light" @click="cleanAll">
                                <span class="icon"><i class="fa fa-trash"></i></span><span>Reset</span>
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        </div>

        <template v-if="genres.length > 0 && onboardingProgress >= 10">
            {% if trending_movies %}
            <section class="section pt-2 pb-0"><div class="container">
                <p class="is-size-4">
                    <i class="fa fa-fire has-text-danger mr-2"></i>Trending Now
                </p>
                <p class="mb-3 has-text-grey">
                    Globally popular and highly rated — drag right to see more.
                </p>
                <div class="columns is-mobile pb-2" style="overflow-x:auto; flex-wrap:nowrap">
                    {% for movie in trending_movies %}
                    <div class="column is-2-fullhd is-2-desktop is-3-tablet is-6-mobile"
                         style="flex:0 0 auto">
                        <div class="card mini">
                            <div class="card-image"
                                 @click="openDetail({{ movie['movieId'] }})"
                                 style="cursor:pointer">
                                <figure class="image is-3by4">
                                    <img src="{{ movie['cover_url'] }}"
                                         onerror="this.src='https://placehold.co/480x640?text=No+Cover';">
                                </figure>
                            </div>
                            <div class="card-content p-2">
                                <p class="is-size-7 has-text-weight-bold">{{ movie['title'] }}</p>
                                <p class="is-size-7 has-text-grey">{{ movie['release_date'] }}</p>
                            </div>
                            <div class="card-footer p-1">
                                <button class="button is-small card-footer-item"
                                        :class="{'is-success': inLikes({{ movie['movieId'] }})}"
                                        @click.stop="updateLike({{ movie['movieId'] }})"
                                        title="Like">
                                    <i class="fa fa-thumbs-up"></i>
                                </button>
                                <button class="button is-small card-footer-item"
                                        :class="{'is-danger': inDislikes({{ movie['movieId'] }})}"
                                        @click.stop="updateDislike({{ movie['movieId'] }})"
                                        title="Not interested">
                                    <i class="fa fa-thumbs-down"></i>
                                </button>
                                <button class="button is-small card-footer-item"
                                        @click.stop="openDetail({{ movie['movieId'] }})"
                                        title="Details">
                                    <i class="fa fa-info-circle"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div></section>
            {% endif %}

            {% if recommendations %}
            <section class="section pt-2 pb-0"><div class="container">
                <p class="is-size-4"><i class="fa fa-star mr-2"></i>Recommended for You</p>
                <p class="mb-3 has-text-grey">{{ recommendations_message }}</p>
                <div class="columns is-multiline">
                    {% for movie in recommendations %}{% include "_movie_card.html" %}{% endfor %}
                </div>
            </div></section>
            {% endif %}

            {% if likes_similars %}
            <section class="section pb-0"><div class="container">
                <p class="is-size-4"><i class="fa fa-heart mr-2"></i>Because You Liked&hellip;</p>
                <p class="mb-3 has-text-grey">{{ likes_similar_message }}</p>
                <div class="columns is-multiline">
                    {% for movie in likes_similars %}{% include "_movie_card.html" %}{% endfor %}
                </div>
            </div></section>
            {% endif %}

            {% if likes %}
            <section class="section pb-0"><div class="container">
                <p class="is-size-4 mb-3"><i class="fa fa-thumbs-up mr-2"></i>My Likes
                    <button class="button is-small ml-3" @click="reloadPage"><i class="fa fa-refresh mr-1"></i>Refresh</button>
                </p>
                <div class="columns is-mobile pb-3" style="overflow-x:auto">
                    {% for movie in likes %}
                    <div class="column is-2-fullhd is-2-desktop is-3-tablet is-6-mobile">
                        <div class="card mini">
                            <div class="card-image"
                                 @click="openDetail({{ movie['movieId'] }})"
                                 style="cursor:pointer">
                                <figure class="image is-3by4">
                                    <img src="{{ movie['cover_url'] }}"
                                         onerror="this.src='https://placehold.co/480x640?text=No+Cover';">
                                </figure>
                            </div>
                            <div class="card-content p-2">
                                <p class="has-text-weight-bold is-size-7">{{ movie['title'] }}</p>
                                <p class="is-size-7 has-text-grey">{{ movie['release_date'] }}</p>
                                <button class="button is-small is-fullwidth is-danger is-light mt-2 is-size-7"
                                        @click.stop="updateLike({{ movie['movieId'] }})"
                                        title="Remove from list">
                                    <i class="fa fa-times mr-1"></i>Remove
                                </button>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div></section>
            {% endif %}

            {% if dislikes %}
            <section class="section pb-0"><div class="container">
                <p class="is-size-4 mb-3"><i class="fa fa-thumbs-down mr-2"></i>My Dislikes
                    <button class="button is-small ml-3" @click="reloadPage"><i class="fa fa-refresh mr-1"></i>Refresh</button>
                </p>
                <div class="columns is-mobile pb-3" style="overflow-x:auto">
                    {% for movie in dislikes %}
                    <div class="column is-2-fullhd is-2-desktop is-3-tablet is-6-mobile">
                        <div class="card mini">
                            <div class="card-image"
                                 @click="openDetail({{ movie['movieId'] }})"
                                 style="cursor:pointer">
                                <figure class="image is-3by4">
                                    <img src="{{ movie['cover_url'] }}"
                                         onerror="this.src='https://placehold.co/480x640?text=No+Cover';">
                                </figure>
                            </div>
                            <div class="card-content p-2">
                                <p class="has-text-weight-bold is-size-7">{{ movie['title'] }}</p>
                                <p class="is-size-7 has-text-grey">{{ movie['release_date'] }}</p>
                                <button class="button is-small is-fullwidth is-danger is-light mt-2 is-size-7"
                                        @click.stop="updateDislike({{ movie['movieId'] }})"
                                        title="Remove from list">
                                    <i class="fa fa-times mr-1"></i>Remove
                                </button>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div></section>
            {% endif %}
        </template>

        <template v-else>{% include "_onboarding.html" %}</template>
        {% include "_modals.html" %}

        <footer class="footer mt-6"><div class="container is-max-widescreen">
            <div class="content has-text-centered">
                <p>Copyright © 2026 <a href="https://hci.comp.hkbu.edu.hk" target="_blank"><strong>PI Lab</strong></a>.</p>
                <a href="https://www.comp.hkbu.edu.hk" target="_blank"><img src="/static/img/comp-logo.png" style="height:30px;margin-right:20px"></a>
                <a href="https://hkbu.edu.hk" target="_blank"><img src="/static/img/bu-logo.png" style="height:30px;"></a>
            </div>
        </div></footer>
    </template>
</div>

<script>
    window.__SERVER_DATA__ = {
        userGenres: {{ user_genres | tojson }},
        userRates: {{ user_rates | tojson }},
        userLikes: {{ user_likes | tojson }},
        userDislikes: {{ user_dislikes | tojson }},
        userInterests: {{ user_interests | tojson }},
        explanations: {{ explanations | tojson }},
        recAlgo: {{ rec_algo | tojson }},
        uiMode: {{ ui_mode | tojson }},
        profileId: {{ profile_id | tojson }},
        profileIds: {{ profile_ids | tojson }}
    };
</script>
<script type="module" src="/static/app.js"></script>
</body>
</html>
